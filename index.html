<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>webx</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0c0b;
            --surface: #050505;
            --text: #d6ccc2;
            --text-dim: #1a1918;
            --bar: #8a817c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at center, var(--bg) 0%, var(--surface) 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: "";
            position: absolute; width: 100%; height: 100%;
            top: 0; left: 0; opacity: 0.04; pointer-events: none;
            background-image: url('https://vercel.app');
        }

        .view {
            text-align: center;
            width: 100%;
            max-width: 400px;
            animation: init 0.4s ease-out forwards;
        }

        @keyframes init {
            0% { opacity: 0; transform: scale(0.99); }
            100% { opacity: 1; transform: scale(1); }
        }

        .visual {
            margin-bottom: 45px;
            position: relative;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe { 0%, 100% { transform: translateY(0); opacity: 0.75; } 50% { transform: translateY(-10px); opacity: 0.95; } }

        .visual img {
            width: 165px;
            height: auto;
            display: block;
            filter: sepia(0.1) contrast(1.05);
        }

        .status-box {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            height: 24px;
            color: var(--text);
            font-size: 15px;
            letter-spacing: 6px;
            font-weight: 500;
            text-transform: lowercase;
        }

        .status-box::before { content: ''; width: 25px; display: inline-block; }
        .dots { display: inline-block; width: 25px; text-align: left; margin-left: 2px; opacity: 0.3; }

        .loader-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .track {
            width: 200px;
            height: 1px;
            background: rgba(214, 204, 194, 0.05);
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }

        .bar {
            position: absolute; left: 0; top: 0; height: 100%; width: 0%;
            background: var(--bar); transition: width 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        .pct { font-size: 7px; color: var(--text-dim); letter-spacing: 3px; }

        .footer {
            position: absolute; bottom: 60px;
            font-size: 8px; letter-spacing: 8px;
            color: #1a1918; text-transform: uppercase;
        }

        .exit { opacity: 0; filter: blur(12px); transform: scale(0.94); transition: all 0.5s ease; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="view">
    <div class="visual">
        <img src="cat.gif" alt="cat" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
        <span style="display:none; color:var(--text-dim); font-size:10px; letter-spacing:5px;">[ cat_lost ]</span>
    </div>

    <div class="status-box">
        <span id="st">analyzing</span><span class="dots-wrap" id="dt"></span>
    </div>
    
    <div class="loader-wrap">
        <div class="track"><div class="bar" id="pb"></div></div>
        <div class="pct" id="pt">0%</div>
    </div>
</div>

<div class="footer">webx &bull; 2026</div>

<script>
     /*  CONFIGURATION  */
    const CONFIG = {
        URL: "https://github.com/L1tty-ru/WebX", // replace with your website URL
        BOT: "https://google.com",
        S1: "analyzing",
        S2: "verifying",
        OK: "granted",
        ERR: "denied"
    };

    function showLogo() {
        console.clear();
        const style = "color: #d1b1ba; font-family: Montserrat; font-size: 70px; font-weight: 800; text-shadow: 4px 4px 0px #0a0a0c; padding: 20px;";
        for(let i=0; i<10; i++) console.log("%cWEBX", style);
    }

    const st = document.getElementById('st');
    const dt = document.getElementById('dt');
    const pb = document.getElementById('pb');
    const pt = document.getElementById('pt');
    let v = 0;
    let d = 0;

    const timer = setInterval(() => {
        d = (d + 1) % 4;
        dt.innerText = '.'.repeat(d);
        if (window.outerHeight - window.innerHeight > 160 || window.outerWidth - window.innerWidth > 160) {
            showLogo();
            debugger;
        }
    }, 500);

    function run() {
        v += Math.floor(Math.random() * 20) + 5;
        if (v > 100) v = 100;
        pb.style.width = v + '%';
        pt.innerText = v + '%';

        if (v < 100) {
            if (v > 45) st.innerText = CONFIG.S2;
            setTimeout(run, Math.random() * 300 + 100);
        } else {
            clearInterval(timer);
            dt.innerText = '';
            
            const isBot = navigator.webdriver || !navigator.languages.length || window.outerWidth === 0;
            
            if (isBot) {
                st.innerText = CONFIG.ERR;
                st.style.color = '#5e4343';
                pb.style.background = '#5e4343';
                setTimeout(() => { window.location.href = CONFIG.BOT; }, 1200);
            } else {
                st.innerText = CONFIG.OK;
                st.style.color = '#fff';
                if (window.navigator.vibrate) window.navigator.vibrate(20); 
                setTimeout(() => {
                    document.body.classList.add('exit');
                    setTimeout(() => { window.location.href = CONFIG.URL; }, 500);
                }, 700);
            }
        }
    }

    showLogo();
    setTimeout(run, 600);
</script>

</body>
</html>
