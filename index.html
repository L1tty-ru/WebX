<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebX Protection</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #08080a;
            --surface: #050505;
            --text: #e0e0e0;
            --dim: #444444;
            --accent: #666666;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; -webkit-user-select: none;
        }

        body {
            background: radial-gradient(circle at center, var(--bg) 0%, var(--surface) 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn { 
            0% { opacity: 0; transform: scale(0.98); } 
            100% { opacity: 1; transform: scale(1); } 
        }

        .media-box {
            margin-bottom: 40px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .media-box img {
            width: 165px;
            height: auto;
            filter: grayscale(1) contrast(1.1);
            animation: float 4s ease-in-out infinite;
            transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        .shy-mode .media-box img {
            transform: scale(1.3);
            filter: grayscale(0) contrast(1) opacity(1) !important;
        }

        @keyframes float { 
            0%, 100% { transform: translateY(0); opacity: 0.75; } 
            50% { transform: translateY(-10px); opacity: 0.95; } 
        }

        .status-area {
            margin-bottom: 30px;
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 15px;
            letter-spacing: 6px;
            font-weight: 500;
            color: var(--text);
            text-transform: lowercase;
        }

        .shy-mode .status-area { color: #fff; }

        .progress-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            transition: opacity 0.3s;
        }

        .shy-mode .progress-container { opacity: 0.1; }

        .track {
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.04);
            position: relative;
            overflow: hidden;
            border-radius: 1px;
        }

        .bar {
            position: absolute; left: 0; top: 0; height: 100%; width: 0%;
            background: var(--accent); transition: width 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        .val { font-size: 9px; color: var(--dim); letter-spacing: 2px; font-weight: 500; }

        .brand {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%); white-space: nowrap;
        }

        .brand a {
            font-size: 9px; letter-spacing: 5px; color: #333;
            text-transform: uppercase; text-decoration: none; transition: 0.3s;
        }

        .brand a:hover { color: var(--text); }

        .done { opacity: 0; filter: blur(12px); transform: scale(0.95); transition: 0.5s ease; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="container" id="app">
    <div class="media-box">
        <img src="assets/cat.gif" id="hero" alt="cat">
    </div>

    <div class="status-area">
        <span id="st">analyzing</span>
        <span id="dots" style="position:absolute; margin-left:110px; opacity:0.2;"></span>
    </div>
    
    <div class="progress-container">
        <div class="track"><div class="bar" id="fill"></div></div>
        <div class="val" id="percent">0%</div>
    </div>
</div>

<div class="brand">
    <a href="https://github.com/L1tty-ru/WebX" target="_blank">powered by &bull; WebX</a>
</div>

<script>
    const cfg = {
        url: "https://github.com/L1tty-ru/WebX",  // replace with your website URL
        bot: "https://google.com",
        states: ["analyzing", "verifying", "granted", "denied", "don't look!"],
        assets: ["assets/cat.gif", "assets/shy.gif"]
    };

    const ui = {
        st: document.getElementById('st'),
        dots: document.getElementById('dots'),
        fill: document.getElementById('fill'),
        pct: document.getElementById('percent'),
        img: document.getElementById('hero'),
        body: document.body
    };

    let p = 0;
    let locked = false;

    new Image().src = cfg.assets[1];

    const guard = () => {
        const dev = window.outerHeight - window.innerHeight > 160 || window.outerWidth - window.innerWidth > 160;

        if (dev) {
            if (!locked) {
                locked = true;
                ui.body.classList.add('shy-mode');
                ui.img.src = cfg.assets[1];
                ui.st.innerText = cfg.states[4];
                ui.dots.innerText = '';
                console.clear();
                console.log("%cWebX protection", "font-size:30px; font-weight:800; color:#fff;");
                (function hook(n) {
                    (function(){}.constructor("debugger")());
                    if (locked) setTimeout(() => hook(++n), 50);
                })(0);
            }
        } else if (locked) {
            locked = false;
            ui.body.classList.remove('shy-mode');
            ui.img.src = cfg.assets[0];
            ui.st.innerText = p > 45 ? cfg.states[1] : cfg.states[0];
        }
    };

    setInterval(() => {
        if (locked) return;
        ui.dots.innerText = ".".repeat((parseInt(Date.now()/500) % 4));
    }, 100);

    setInterval(guard, 400);
    window.addEventListener('load', guard);
    window.addEventListener('resize', guard);

    const core = () => {
        if (locked) return setTimeout(core, 500);

        p += Math.floor(Math.random() * 12) + 3;
        if (p > 100) p = 100;

        ui.fill.style.width = p + '%';
        ui.pct.innerText = p + '%';

        if (p < 100) {
            if (p > 45 && !locked) ui.st.innerText = cfg.states[1];
            setTimeout(core, Math.random() * 300 + 150);
        } else {
            ui.dots.innerText = '';
            const bot = navigator.webdriver || !navigator.languages.length || !window.outerWidth;

            if (bot) {
                ui.st.innerText = cfg.states[3];
                ui.st.style.color = '#5a3a3a';
                setTimeout(() => location.href = cfg.bot, 1000);
            } else {
                ui.st.innerText = cfg.states[2];
                ui.st.style.color = '#fff';
                if (navigator.vibrate) navigator.vibrate(20);
                setTimeout(() => {
                    ui.body.classList.add('done');
                    setTimeout(() => location.href = cfg.url, 500);
                }, 700);
            }
        }
    };

    core();
</script>

</body>
</html>
